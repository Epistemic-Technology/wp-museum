name: wp-museum

x-php-build: &php-build
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: wp-museum/wordpress:8.4

x-php-env: &php-env
  XDEBUG_MODE: ${XDEBUG_MODE:-}
  XDEBUG_CONFIG: ${XDEBUG_CONFIG:-}
  WP_TESTS_PHPUNIT_POLYFILLS_PATH: /app/vendor/yoast/phpunit-polyfills
  WP_TESTS_DIR: /app/tests/
  WP_CLI_ALLOW_ROOT: "1"

x-test-env: &test-env
  TEST_DB_NAME: wptest
  TEST_DB_USER: wptest
  TEST_DB_PASS: wptest
  TEST_DB_HOST: fpm-test-db
  TEST_WP_ADMIN_USER: admin
  TEST_WP_ADMIN_PASS: admin
  TEST_WP_ADMIN_EMAIL: admin@test.com
  TEST_SITE_URL: ${TEST_SITE_URL:-http://nginx-test}

services:
  fpm:
    <<: *php-build
    volumes:
      - .:/app
      - ./docker/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
    environment:
      <<: *php-env
      WP_HOME: ${WP_HOME:-}
    working_dir: /app
    depends_on:
      - database
    networks:
      dev:
        aliases: [fpm]

  nginx:
    image: nginx:alpine
    volumes:
      - .:/app
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/certs:ro
    ports:
      - "${DEV_HTTP_PORT:-8080}:80"
      - "${DEV_HTTPS_PORT:-8443}:443"
    depends_on:
      - fpm
    networks: [dev]

  database:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: wordpress
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    networks: [dev]

  fpm-test:
    <<: *php-build
    volumes:
      - .:/app
      - ./docker/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
    environment:
      <<: [*php-env, *test-env]
    working_dir: /app
    depends_on:
      - fpm-test-db
    networks:
      test:
        aliases: [fpm]

  nginx-test:
    image: nginx:alpine
    volumes:
      - .:/app
      - ./docker/nginx-test.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/certs:ro
    ports:
      - "${TEST_HTTP_PORT:-8081}:80"
      - "${TEST_HTTPS_PORT:-8444}:443"
    depends_on:
      - fpm-test
    networks: [test]

  fpm-test-db:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: wptest
      MARIADB_DATABASE: wptest
      MARIADB_USER: wptest
      MARIADB_PASSWORD: wptest
    volumes:
      - test-db-data:/var/lib/mysql
    networks: [test]

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /app/tests/playwright
    volumes:
      - .:/app
    environment:
      <<: *test-env
      PLAYWRIGHT_HTML_OPEN: never
    networks: [test]
    profiles: [playwright]
    command: ["tail", "-f", "/dev/null"]

networks:
  dev:
  test:

volumes:
  db-data:
  test-db-data:
